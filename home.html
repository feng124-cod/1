<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>我们的纪念</title>
<style>
  body{margin:0;padding:30px;background:#fffafa;font-family:微软雅黑;}
  .title{text-align:center;font-size:26px;color:#ff6b9d;margin-bottom:20px;}

 /* 照片规则布局：中间大 两边小 */
.photo-wall {
  position: relative;
  width: 100%;
  height: 400px; /* 适配新尺寸，比原来更合理 */
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px; /* 照片之间的间距 */
}
.photo {
  border-radius: 12px;
  border: 4px solid #ffc0cb;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  cursor: pointer;
  object-fit: cover;
  transition: transform 0.2s; /* 鼠标悬浮轻微放大，增加交互感 */
}
/* 左边小图 */
.p1 {
  width: 150px;
  height: 220px;
}
/* 中间大图（核心突出） */
.p2 {
  width: 250px;
  height: 350px;
}
/* 右边小图 */
.p3 {
  width: 150px;
  height: 220px;
}
/* 鼠标悬浮效果（可选，增加质感） */
.photo:hover {
  transform: scale(1.03);
}

  /* 倒计时 */
  .day-box{text-align:center;font-size:20px;color:#ff497c;margin:20px 0;}

  /* 时间轴 */
  .timeline{max-width:600px;margin:50px auto;padding:20px;border-left:3px solid #ff8fab;}
  .item{margin-bottom:20px;padding-left:20px;position:relative;}
  .item::before{content:"";width:12px;height:12px;background:#ff8fab;border-radius:50%;position:absolute;left:-8px;top:5px;}
  .date{font-weight:bold;color:#ff6b9d;}
  .text{color:#555;}

  /* 弹窗 */
  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
  .modal-content{background:white;padding:30px;border-radius:20px;color:#ff497c;font-size:18px;text-align:center;}
</style>
</head>
<body>

<!-- 背景音乐（补全闭合标签） -->
<audio id="bgm" loop autoplay>
  <source src="love.mp3" type="audio/mpeg">
</audio> <!-- 你漏了这个闭合标签！ -->

<div class="title">我们在一起啦 ❤️</div>

<div class="day-box">
  我们已经相爱 <span id="days"></span> 天啦
</div>

<div class="photo-wall">
   <img src="照片1.jpg" class="photo p1" onclick="say(1)">
   <img src="照片2.jpg" class="photo p2" onclick="say(2)">
  <img src="照片3.jpg" class="photo p3" onclick="say(3)">
</div>

<!-- 时间轴 -->
<div class="timeline">
  <div class="item">
    <div class="date">2024.01.11</div>
    <div class="text">我们正式在一起啦</div>
  </div>
  <div class="item">
    <div class="date">2024.02.14</div>
    <div class="text">一起过的第一个情人节</div>
  </div>
  <div class="item">
    <div class="date">2024.05.20</div>
    <div class="text">很开心，一直是你</div>
  </div>
  <div class="item">
    <div class="date">以后每一天</div>
    <div class="text">我都会一直喜欢你</div>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal" id="modal">
  <div class="modal-content" id="msg"></div>
</div>

<script>
// 倒计时（修复时间计算的数学错误）
function countDays(){
  let start = new Date("2024-01-11");
  let now = new Date(); // 改为获取当前时间，更实用
  // 修复：1000*60*60*24 少写了一个0！
  let diff = Math.floor((now - start)/(1000*60*60*24));
  document.getElementById("days").innerText = diff;
}
countDays();

// 点击照片弹情话（补全逻辑，增加点击关闭）
function say(n){
  let m = document.getElementById("modal");
  let t = document.getElementById("msg");
  let text = [
    "遇见你，是我这辈子最幸运的事",
    "我会一直陪着你，岁岁年年",
    "我爱你，不是一时兴起，是余生都是你"
  ];
  t.innerText = text[n-1];
  m.style.display = "flex";
  // 点击弹窗也能关闭
  m.onclick = () => {m.style.display="none"};
  setTimeout(()=>{m.style.display="none"},2000);
}

// 背景音乐自动播放（解决浏览器限制）
window.addEventListener('click',()=>{
  const bgm = document.getElementById('bgm');
  bgm.play().catch(err => console.log('音乐播放需手动点击页面'));
}, {once:true});
</script>
</body>
</html>
